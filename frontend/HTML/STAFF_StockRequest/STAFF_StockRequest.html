<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Staff - Stock Request</title>
	<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100">
	<div class="container mx-auto p-6">
		<div class="mb-6">
			<h1 class="text-2xl font-bold text-slate-900">Stock Request</h1>
			<p class="text-slate-600">Request restocking for low stock items</p>
		</div>

		<!-- Low Stock Items -->
		<div class="bg-white rounded-xl shadow-sm p-4 md:p-6 mb-6">
			<h2 class="text-lg font-semibold mb-4">Low Stock Items</h2>
			<p class="text-sm text-slate-600 mb-4">Select items and specify quantities to request</p>

			<div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
				<div>
					<label for="stockSearchInput" class="block text-sm font-medium mb-2">Search Item</label>
					<input id="stockSearchInput" type="text" placeholder="Search by item name" class="w-full border border-slate-300 rounded px-3 py-2" />
				</div>
				<div>
					<label for="stockLevelFilter" class="block text-sm font-medium mb-2">Low Stock Filter</label>
					<select id="stockLevelFilter" class="w-full border border-slate-300 rounded px-3 py-2">
						<option value="all">All Low Stock</option>
						<option value="critical">Critical Only</option>
					</select>
				</div>
			</div>
			
			<div class="overflow-x-auto mb-4">
				<table class="w-full text-sm">
					<thead class="bg-slate-100">
						<tr>
							<th class="px-4 py-2 text-left">
								<input type="checkbox" id="selectAll" onchange="toggleSelectAll()" />
							</th>
							<th class="px-4 py-2 text-left">Item Name</th>
							<th class="px-4 py-2 text-center">Current Stock</th>
							<th class="px-4 py-2 text-center">Min Stock</th>
							<th class="px-4 py-2 text-center">Requested Qty</th>
						</tr>
					</thead>
					<tbody id="lowStockItems">
						<tr>
							<td colspan="5" class="text-center py-4 text-slate-500">Loading low stock items...</td>
						</tr>
					</tbody>
				</table>
			</div>

			<div class="mb-4">
				<label class="block text-sm font-medium mb-2">Notes (Optional)</label>
				<textarea id="requestNotes" rows="3" class="w-full border border-slate-300 rounded px-3 py-2" placeholder="Add any additional notes about this request"></textarea>
			</div>

			<button onclick="submitStockRequest()" class="bg-blue-600 text-white px-6 py-2 rounded hover:bg-blue-700">
				Submit Restock Request
			</button>
		</div>

		<!-- Request History -->
		<div class="bg-white rounded-lg shadow-md p-6">
			<h2 class="text-lg font-semibold mb-4">My Request History</h2>
			<div id="requestHistory"></div>
		</div>
	</div>

	<script>
		const API_BASE = 'http://localhost:3000/api';
		const TOKEN_KEYS = ['token', 'authToken', 'jwtToken', 'ibmsToken'];
		const token = TOKEN_KEYS.map(k => localStorage.getItem(k)).find(v => v && v.trim()) || '';
		let lowStockData = [];
		let stockSearch = '';
		let stockLevelFilter = 'all';

		// Load low stock items
		async function loadLowStockItems() {
			try {
				const response = await fetch(`${API_BASE}/staff/stock-requests/low-stock-items`, {
					headers: { 'Authorization': `Bearer ${token}` }
				});
				const result = await response.json();

				if (response.ok) {
					lowStockData = result.data;
					renderLowStockItems();
				}
			} catch (error) {
				console.error('Error loading low stock items:', error);
			}
		}

		// Render low stock items
		function renderLowStockItems() {
			const tbody = document.getElementById('lowStockItems');
			const normalizedSearch = stockSearch.trim().toLowerCase();

			const filteredData = lowStockData
				.map((item, sourceIndex) => ({ item, sourceIndex }))
				.filter(({ item }) => {
					const matchesSearch = !normalizedSearch || (item.name || '').toLowerCase().includes(normalizedSearch);
					const isCritical = Number(item.quantity || 0) <= Math.max(1, Math.floor(Number(item.minStock || 0) * 0.5));
					const matchesLevel = stockLevelFilter === 'all' || (stockLevelFilter === 'critical' && isCritical);
					return matchesSearch && matchesLevel;
				});
			
			if (filteredData.length === 0) {
				tbody.innerHTML = '<tr><td colspan="5" class="text-center py-4 text-slate-500">No low stock items</td></tr>';
				return;
			}

			tbody.innerHTML = filteredData.map(({ item, sourceIndex }) => `
				<tr class="border-b hover:bg-slate-50">
					<td class="px-4 py-2">
						<input type="checkbox" class="item-checkbox" data-source-index="${sourceIndex}" />
					</td>
					<td class="px-4 py-2">${item.name}</td>
					<td class="px-4 py-2 text-center">
						<span class="px-2 py-1 rounded text-xs font-medium bg-red-100 text-red-800">
							${item.quantity}
						</span>
					</td>
					<td class="px-4 py-2 text-center">${item.minStock}</td>
					<td class="px-4 py-2 text-center">
						<input 
							type="number" 
							id="qty-${sourceIndex}" 
							min="1" 
							value="${Math.max(item.minStock - item.quantity + 10, 10)}"
							class="w-24 border border-slate-300 rounded px-2 py-1 text-center"
						/>
					</td>
				</tr>
			`).join('');
		}

		// Toggle select all
		function toggleSelectAll() {
			const selectAll = document.getElementById('selectAll').checked;
			document.querySelectorAll('.item-checkbox').forEach(cb => {
				cb.checked = selectAll;
			});
		}

		// Submit stock request
		async function submitStockRequest() {
			const selectedItems = [];
			
			document.querySelectorAll('.item-checkbox:checked').forEach(cb => {
				const sourceIndex = cb.dataset.sourceIndex;
				const item = lowStockData[sourceIndex];
				const quantity = parseInt(document.getElementById(`qty-${sourceIndex}`).value);
				
				if (quantity > 0) {
					selectedItems.push({
						productId: item._id,
						requestedQuantity: quantity
					});
				}
			});

			if (selectedItems.length === 0) {
				alert('Please select at least one item');
				return;
			}

			const notes = document.getElementById('requestNotes').value;

			try {
				const response = await fetch(`${API_BASE}/staff/stock-requests`, {
					method: 'POST',
					headers: {
						'Content-Type': 'application/json',
						'Authorization': `Bearer ${token}`
					},
					body: JSON.stringify({ items: selectedItems, notes })
				});

				const result = await response.json();

				if (response.ok) {
					alert(`Stock request submitted successfully! Request ID: ${result.data.requestId}`);
					document.getElementById('requestNotes').value = '';
					document.getElementById('selectAll').checked = false;
					loadLowStockItems();
					loadRequestHistory();
				} else {
					alert(`Error: ${result.message}`);
				}
			} catch (error) {
				alert(`Error: ${error.message}`);
			}
		}

		document.getElementById('stockSearchInput')?.addEventListener('input', (event) => {
			stockSearch = event.target.value || '';
			renderLowStockItems();
		});

		document.getElementById('stockLevelFilter')?.addEventListener('change', (event) => {
			stockLevelFilter = event.target.value || 'all';
			renderLowStockItems();
		});

		// Load request history
		async function loadRequestHistory() {
			try {
				const response = await fetch(`${API_BASE}/staff/stock-requests`, {
					headers: { 'Authorization': `Bearer ${token}` }
				});
				const result = await response.json();

				if (response.ok) {
					const history = document.getElementById('requestHistory');
					
					if (result.data.length === 0) {
						history.innerHTML = '<p class="text-slate-500 text-center py-4">No requests yet</p>';
						return;
					}

					history.innerHTML = result.data.map(request => {
						const statusColor = {
							'Pending': 'bg-yellow-100 text-yellow-800',
							'Approved': 'bg-green-100 text-green-800',
							'Partially Approved': 'bg-blue-100 text-blue-800',
							'Rejected': 'bg-red-100 text-red-800'
						}[request.status];

						return `
							<div class="border-b pb-4 mb-4 last:border-b-0">
								<div class="flex justify-between items-start mb-2">
									<div>
										<div class="font-semibold">${request.requestId}</div>
										<div class="text-sm text-slate-600">${new Date(request.createdAt).toLocaleDateString()}</div>
									</div>
									<span class="px-2 py-1 rounded text-xs font-medium ${statusColor}">
										${request.status}
									</span>
								</div>
								<div class="text-sm">
									<div class="font-medium mb-1">Items (${request.items.length}):</div>
									${request.items.map(item => `
										<div class="ml-4 text-slate-600">
											• ${item.productName}: ${item.requestedQuantity} units
											${item.status !== 'Pending' ? `<span class="text-xs">(${item.status}${item.approvedQuantity ? ': ' + item.approvedQuantity : ''})</span>` : ''}
										</div>
									`).join('')}
								</div>
								${request.notes ? `<div class="text-sm text-slate-600 mt-2">Notes: ${request.notes}</div>` : ''}
							</div>
						`;
					}).join('');
				}
			} catch (error) {
				console.error('Error loading request history:', error);
			}
		}

		// Load data on page load
		loadLowStockItems();
		loadRequestHistory();
	</script>
</body>
</html>
