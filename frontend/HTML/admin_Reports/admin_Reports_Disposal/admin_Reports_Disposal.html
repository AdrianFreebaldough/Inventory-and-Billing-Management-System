<div id="contentArea" class="space-y-6 p-0">
  <section class="grid grid-cols-1 gap-4 md:grid-cols-3" id="disposalReportStats"></section>

  <section class="rounded-2xl border border-slate-200 bg-white p-6 shadow-sm">
    <div class="grid grid-cols-1 gap-4 md:grid-cols-2 xl:grid-cols-4">
      <label class="text-sm">
        <span class="mb-1 block text-xs font-medium uppercase tracking-wide text-slate-500">Start Date</span>
        <input id="disposalReportStartDate" type="date" class="w-full rounded-lg border border-slate-300 px-3 py-2" />
      </label>
      <label class="text-sm">
        <span class="mb-1 block text-xs font-medium uppercase tracking-wide text-slate-500">End Date</span>
        <input id="disposalReportEndDate" type="date" class="w-full rounded-lg border border-slate-300 px-3 py-2" />
      </label>
      <label class="text-sm">
        <span class="mb-1 block text-xs font-medium uppercase tracking-wide text-slate-500">Item Name</span>
        <input id="disposalReportItemName" type="search" placeholder="Search item..." class="w-full rounded-lg border border-slate-300 px-3 py-2" />
      </label>
      <label class="text-sm">
        <span class="mb-1 block text-xs font-medium uppercase tracking-wide text-slate-500">Reason</span>
        <select id="disposalReportReason" class="w-full rounded-lg border border-slate-300 px-3 py-2">
          <option value="">All Reasons</option>
          <option value="Expired">Expired</option>
          <option value="Damaged">Damaged</option>
          <option value="Contaminated">Contaminated</option>
          <option value="Manufacturer Recall">Manufacturer Recall</option>
          <option value="Incorrect Storage">Incorrect Storage</option>
          <option value="Other">Other</option>
        </select>
      </label>
    </div>
    <div class="mt-4 flex justify-end gap-2">
      <button id="disposalReportResetBtn" class="rounded-lg border border-slate-300 px-4 py-2 text-sm font-medium text-slate-700 hover:bg-slate-50">Reset</button>
      <button id="disposalReportApplyBtn" class="rounded-lg bg-slate-900 px-4 py-2 text-sm font-medium text-white hover:bg-slate-800">Apply Filters</button>
    </div>
  </section>

  <section class="overflow-hidden rounded-2xl border border-slate-200 bg-white shadow-sm">
    <div class="flex items-center justify-between border-b border-slate-200 px-6 py-4">
      <div>
        <h3 class="text-lg font-semibold text-slate-900">Disposal Report</h3>
        <p class="text-sm text-slate-500">Disposed batch records for audit and compliance export.</p>
      </div>
      <span id="disposalReportCount" class="text-xs text-slate-500">0 rows</span>
    </div>
    <div class="overflow-x-auto">
      <table class="min-w-full text-sm">
        <thead class="bg-slate-50 text-left text-xs uppercase tracking-wide text-slate-500">
          <tr>
            <th class="px-4 py-3">Date</th>
            <th class="px-4 py-3">Item</th>
            <th class="px-4 py-3">Batch</th>
            <th class="px-4 py-3">Quantity</th>
            <th class="px-4 py-3">Reason</th>
            <th class="px-4 py-3">Approved By</th>
            <th class="px-4 py-3">Reference ID</th>
          </tr>
        </thead>
        <tbody id="disposalReportTableBody" class="divide-y divide-slate-100 bg-white"></tbody>
      </table>
    </div>
  </section>
</div>
