<!-- Admin Settings Module - Main Container -->
<div class="w-full px-6 py-3 flex flex-col h-full">
    
    <!-- Settings Navigation Tabs - FIXED AT TOP -->
    <div id="tabButtons" class="flex w-full mb-4 flex-shrink-0">
        <button id="tab-billing" class="flex-1 py-2 rounded-tl-lg rounded-bl-lg bg-blue-700 text-white font-semibold transition-colors duration-200">
            Billing Controls
        </button>
        <button id="tab-clinic" class="flex-1 py-2 rounded-sm bg-gray-200 text-gray-700 font-semibold hover:bg-gray-300 transition-colors duration-200">
            Clinic Profile
        </button>
        <button id="tab-inventory" class="flex-1 py-2 rounded-sm bg-gray-200 text-gray-700 font-semibold hover:bg-gray-300 transition-colors duration-200">
            Inventory Controls
        </button>
        <button id="tab-system" class="flex-1 py-2 rounded-tr-lg rounded-br-lg bg-gray-200 text-gray-700 font-semibold hover:bg-gray-300 transition-colors duration-200">
            System & Security
        </button>
    </div>

    <!-- Content Area with Button - Flex Layout -->
    <div class="flex flex-col min-h-0 bg-white rounded-lg shadow-sm">
        <!-- Dynamic Content Area -->
        <div id="settingsContentArea" class="h-full">
            <!-- Settings content injected here -->
        </div>

        <!-- Global Action Button -->
    <div id="globalActionContainer" class="flex justify-end pt-0 pb-10 pr-20 px-6 bg-white rounded-lg shadow-sm hidden flex-shrink-0">
        <button id="globalEditSaveBtn" 
            class="px-4 py-3 bg-blue-700 hover:bg-blue-800 text-white rounded-lg text-base font-semibold focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 transition-colors flex items-center gap-2">
            <img src="../../assets/edit_icon.png" id="globalBtnIcon" class="w-4 h-4 invert brightness-0" alt="edit"/>
            <span id="globalBtnText">Edit</span>
        </button>
    </div>
    </div>
</div>

<!-- Global Toast Notification -->
<div id="globalToast" class="fixed bottom-6 right-6 transform translate-y-20 opacity-0 transition-all duration-300 z-50">
    <div class="bg-blue-600 text-white px-4 py-3 rounded-lg shadow-lg flex items-center gap-3">
        <svg id="toastIcon" class="w-5 h-5 text-white hidden" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
        </svg>
        <span id="globalToastText" class="text-sm font-medium">Saved Changes Successfully</span>
    </div>
</div>
