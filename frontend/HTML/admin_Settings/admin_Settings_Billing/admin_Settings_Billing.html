<!-- Billing Controls Content Only -->
<div class="h-full p-8">
    <div class="pl-8 flex flex-col mx-auto pr-10">
        <!-- Header -->
        <div>
            <h2 class="text-3xl font-semibold mt-4 text-gray-900">Billing Controls</h2>
            <p class="text-sm text-gray-500 my-2">Manage tax rates, discounts, and currency settings</p>
        </div>

        <!-- Tax Configuration -->
        <div class="space-y-5">
            <h3 class="text-base font-xl text-gray-900">Tax Configuration</h3>
            <div class="grid grid-cols-3 gap-8">
                <div class="space-y-1.5">
                    <label class="flex items-center gap-1 text-base text-gray-600">
                        VAT Rate (%)
                        <img src="../../assets/information_icon.png" alt="info" class="w-3.5 h-3.5 opacity-60"/>
                    </label>
                    <input type="number" id="vatRate" value="12" disabled 
                        class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg bg-gray-50 text-gray-600 cursor-not-allowed focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"/>
                </div>
                
                <div class="space-y-1.5">
                    <label class="flex items-center gap-1 text-base text-gray-600">
                        Senior Citizen Discount (%)
                        <img src="../../assets/information_icon.png" alt="info" class="w-3.5 h-3.5 opacity-60"/>
                    </label>
                    <input type="number" id="seniorDiscount" value="20" disabled
                        class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg bg-gray-50 text-gray-600 cursor-not-allowed focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"/>
                </div>
                
                <div class="space-y-1.5">
                    <label class="flex items-center gap-1 text-base text-gray-600">
                        PWD Discount (%)
                        <img src="../../assets/information_icon.png" alt="info" class="w-3.5 h-3.5 opacity-60"/>
                    </label>
                    <input type="number" id="pwdDiscount" value="20" disabled
                        class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg bg-gray-50 text-gray-600 cursor-not-allowed focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"/>
                </div>
            </div>
        </div>

        <!-- Price Adjustment -->
        <div class="space-y-5">
            <h3 class="text-xl font-medium text-gray-900">Price Adjustment</h3>
            <div class="grid grid-cols-2 gap-8">
                <div class="space-y-1.5">
                    <label class="flex items-center gap-1 text-base text-gray-600">
                        Bulk Price Adjustment (%)
                        <img src="../../assets/information_icon.png" alt="info" class="w-3.5 h-3.5 opacity-60"/>
                    </label>
                    <input type="number" id="bulkAdjustment" value="0" disabled
                        class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg bg-gray-50 text-gray-600 cursor-not-allowed focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"/>
                </div>
                
                <div class="space-y-1.5">
                    <label class="flex items-center gap-1 text-base text-gray-600">
                        Default Markup Rate (%)
                        <img src="../../assets/information_icon.png" alt="info" class="w-3.5 h-3.5 opacity-60"/>
                    </label>
                    <input type="number" id="markupRate" value="0" disabled
                        class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg bg-gray-50 text-gray-600 cursor-not-allowed focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"/>
                </div>
            </div>
        </div>
    </div>
</div>
