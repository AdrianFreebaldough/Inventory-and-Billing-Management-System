<!-- Clinic Profile Content Only -->
<div class="h-[545px] pt-8 pl-8 pr-10 pb-8">
    <div class="pl-8 flex flex-col mx-auto pr-10 overflow-y-auto">
        <!-- Header -->
        <div>
            <h2 class="text-3xl font-semibold mt-3 text-gray-900">Clinic Profile</h2>
            <p class="text-sm text-gray-500 my-2">Manage clinic information for receipts and documents</p>
        </div>

        <!-- Clinic Information -->
        <div class="space-y-2">
            <h3 class="text-base font-xl text-gray-900">Clinic Information</h3>
            
            <div class="space-y-1.5">
                <label class="flex items-center gap-1 text-base text-gray-600">
                    Clinic Name
                </label>
                <input type="text" id="clinicName" disabled 
                    class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg bg-gray-50 text-gray-600 cursor-not-allowed focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"/>
            </div>

            <div class="space-y-1.5">
                <label class="flex items-center gap-1 text-base text-gray-600">
                    Address
                </label>
                <input type="text" id="clinicAddress" disabled
                    class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg bg-gray-50 text-gray-600 cursor-not-allowed focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"/>
            </div>

            <div class="grid grid-cols-2 gap-4">
                <div class="space-y-1.5">
                    <label class="flex items-center gap-1 text-base text-gray-600">
                        Telephone Number
                    </label>
                    <input type="text" id="clinicPhone" disabled 
                        class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg bg-gray-50 text-gray-600 cursor-not-allowed focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"/>
                </div>
                
                <div class="space-y-1.5">
                    <label class="flex items-center gap-1 text-base text-gray-600">
                        Email
                    </label>
                    <input type="email" id="clinicEmail" disabled 
                        class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg bg-gray-50 text-gray-600 cursor-not-allowed focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"/>
                </div>
            </div>
        </div>

        <!-- Logo Management -->
        <div class="space-y-4">
            <h3 class="text-xl font-medium mt-2 text-gray-900">Logo Management</h3>
            
            <div class="space-y-1">
                <label class="flex items-center gap-1 text-base text-gray-600">
                    Clinic Logo
                </label>
                <div class="flex items-start gap-3">
                    <div class="w-24 h-24 border-2 border-dashed border-gray-300 rounded-lg flex items-center justify-center bg-gray-50">
                        <svg class="w-8 h-8 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                        </svg>
                    </div>
                    <div class="flex flex-col gap-2">
                        <button id="uploadLogoBtn" disabled
                            class="px-4 py-2 bg-gray-100 text-gray-400 rounded-md text-sm font-medium border border-gray-300 cursor-not-allowed transition-colors">
                            Upload Logo
                        </button>
                        <p class="text-xs text-gray-500">Recommended: 512×512px, PNG with transparent background</p>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
