<!-- System & Security Content Only -->
<div class="h-full p-8">
    <div class="pl-8 h-[380px] flex flex-col mx-auto pr-10">
        <!-- Header -->
        <div>
            <h2 class="text-3xl font-semibold mt-4 text-gray-900">System & Security</h2>
            <p class="text-sm text-gray-500 my-2">Configure audit logs, session timeout, and backups</p>
        </div>

        <!-- Audit Log Retention -->
        <div class="space-y-3">
            <h3 class="text-base font-xl text-gray-900">Audit Log Retention</h3>
            <div class="grid grid-cols-1 gap-8 w-full">
                <div class="space-y-1.5">
                    <label class="flex items-center gap-1 text-base text-gray-600">
                        Retention Period
                        <img src="../../assets/information_icon.png" alt="info" class="w-3.5 h-3.5 opacity-60"/>
                    </label>
                    <select id="retentionPeriod" disabled 
                        class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg bg-gray-50 text-gray-600 cursor-not-allowed focus:outline-none focus:ring-2 focus:ring-emerald-600 focus:border-transparent appearance-none">
                        <option value="3 months">3 months</option>
                        <option value="6 months">6 months</option>
                        <option value="1 year" selected>1 year</option>
                        <option value="2 years">2 years</option>
                        <option value="never delete">Never delete</option>
                    </select>
                    <p class="text-xs text-gray-400 py-1 mt-1">Audit logs older than selected period will be automatically deleted</p>
                </div>
            </div>
        </div>

        <!-- Session Timeout -->
        <div class="space-y-3">
            <h3 class="text-xl font-medium mt-2 text-gray-900">Session Timeout</h3>
            <div class="grid grid-cols-1 gap-8 w-full">
                <div class="space-y-1.5">
                    <label class="flex items-center gap-1 text-base text-gray-600">
                        Idle Time Before Auto Logout
                        <img src="../../assets/information_icon.png" alt="info" class="w-3.5 h-3.5 opacity-60"/>
                    </label>
                    <select id="sessionTimeout" disabled
                        class="w-full px-3 py-2 text-sm border border-gray-200 rounded-lg bg-gray-50 text-gray-600 cursor-not-allowed focus:outline-none focus:ring-2 focus:ring-emerald-600 focus:border-transparent appearance-none">
                        <option value="15 minutes">15 minutes</option>
                        <option value="30 minutes" selected>30 minutes</option>
                        <option value="1 hour">1 hour</option>
                        <option value="don't log out">Don't log out</option>
                    </select>
                </div>
            </div>
        </div>
    </div>
</div>
<!-- Button is injected dynamically by admin_Settings.js -->
