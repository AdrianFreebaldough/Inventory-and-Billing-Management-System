<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Admin Dashboard</title>
  <link rel="stylesheet" href="../../css/output.css" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="../../JS/utils/authSession.js"></script>
  <script>
    window.IBMSAuth?.protectPage({ requiredRole: "owner" });
  </script>
</head>

<body class="flex min-h-screen bg-gray-50">

<!-- ===== SIDEBAR ===== -->
<aside class="w-64 bg-white border-r flex flex-col fixed h-screen">

  <!-- Logo -->
  <div class="h-16 px-4 flex items-center gap-2 border-b">
    <img src="../../assets/zealLogo.png" alt="ZCMMF Logo" class="h-9 w-9 object-contain rounded-md shrink-0">
    <div>
      <p class="text-base font-semibold text-gray-900 leading-tight">ZCMMF</p>
    </div>
  </div>

  <!-- NAV -->
  <nav class="flex-1 px-4 py-6 space-y-2">

    <!-- Dashboard -->
    <a href="#" id="navDashboard" class="nav-link flex items-center gap-3 px-4 py-2 rounded-lg bg-blue-600 text-white">
      <span>Dashboard</span>
    </a>

<!-- Inventory (placeholder)-->
    <a href="#" id="navInventory" class="nav-link flex items-center gap-3 px-4 py-2 rounded-lg text-gray-700 hover:bg-gray-100">
  <span>Inventory</span>
</a>

<!-- User Management (placeholder) -->
    <a href="#" id="navUserManagement" class="nav-link flex items-center gap-3 px-4 py-2 rounded-lg text-gray-700 hover:bg-gray-100">
  <span>User Management</span>
</a>

<!-- Reports (placeholder) -->
    <a href="#" id="navReports" class="nav-link flex items-center gap-3 px-4 py-2 rounded-lg text-gray-700 hover:bg-gray-100">
  <span>Reports</span>
</a>

<!-- Expenses -->
    <a href="#" id="navExpenses" class="nav-link flex items-center gap-3 px-4 py-2 rounded-lg text-gray-700 hover:bg-gray-100">
  <span>Expenses</span>
</a>

<!-- Stock Logs (placeholder) -->
    <a href="#" id="navStockLogs" class="nav-link flex items-center gap-3 px-4 py-2 rounded-lg text-gray-700 hover:bg-gray-100">
  <span>Stock Logs</span>
</a>

  </nav>

  <!-- LOGOUT -->
  <div class="border-t p-4 mt-auto">
    <button
      id="logoutBtn" type="button" class="w-full flex items-center gap-3 px-4 py-2 rounded-lg text-gray-700 hover:bg-red-50 hover:text-red-600 transition">
       Logout
    </button>
  </div>

</aside>


<!-- ===== MAIN ===== -->
<main class="ml-64 flex min-h-screen flex-1 flex-col">

  <!-- HEADER -->
  <header class="fixed left-64 right-0 top-0 z-20 h-16 flex justify-end items-center px-4 bg-white border-b">

    <div class="flex items-center gap-3">
      <div id="notificationWidget" class="relative"></div>
      <button id="profileBtn" class="flex items-center gap-3 hover:bg-gray-50 rounded-lg px-2 py-1 transition-colors cursor-pointer">
        <div id="staffAvatar" class="w-8 h-8 bg-blue-600 rounded-full text-white flex items-center justify-center font-semibold text-sm">A</div>
        <div>
          <p id="staffName" class="font-medium">Staff Name</p>
          <p id="staffUsername" class="text-xs text-left text-gray-500">username</p>
        </div>
      </button>
    </div>
  </header>

  <!-- 🔥 DYNAMIC CONTENT -->
  <section
    id="mainContent"
    class="flex-1 overflow-y-auto p-6 pt-20">
    <!-- Dashboard content will be injected here by JavaScript -->
  </section>

</main>

<script type="module" src="../../js/admin_dashboard/admin_dashboard.js?v=20260308-layoutfix2"></script>
</body>
</html>
