<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Staff Dashboard</title>
  <link rel="stylesheet" href="../../css/output.css" />
</head>

<body class="flex min-h-screen bg-gray-50">

<!-- ===== SIDEBAR ===== -->
<aside class="w-64 bg-white border-r flex flex-col fixed h-screen">

  <!-- Logo -->
  <div class="p-6 flex items-center gap-3 border-b">
    <div class="bg-emerald-600 text-white p-3 rounded-lg">+</div>
    <div>
      <p class="font-semibold">General Medicine Clinic</p>
      <p class="text-sm text-gray-500">Staff Portal</p>
    </div>
  </div>

  <!-- NAV -->
  <nav class="flex-1 px-4 py-6 space-y-2">

    <!-- Dashboard -->
    <a href="#"
       id="navDashboard"
       class="nav-link flex items-center gap-3 px-4 py-2 rounded-lg bg-emerald-600 text-white">
      <span>Dashboard</span>
    </a>

    <!-- Billing -->
     <a href="#"
       id="navBilling"
       class="nav-link flex items-center gap-3 px-4 py-2 rounded-lg text-gray-700 hover:bg-gray-100">
      <span>Billing</span>
    </a>

    <!-- Inventory (placeholder) -->
    <a href="#"
       class="flex items-center gap-3 px-4 py-2 rounded-lg text-gray-400 cursor-not-allowed">
      <span>Inventory</span>
    </a>

  </nav>

  <!-- LOGOUT -->
  <div class="border-t p-4 mt-auto">
    <button
      id="logoutBtn"
      type="button"
      class="w-full flex items-center gap-3 px-4 py-2 rounded-lg text-gray-700 hover:bg-red-50 hover:text-red-600 transition">
      🚪 Logout
    </button>
  </div>

</aside>

<!-- ===== MAIN ===== -->
<main class="ml-64 flex flex-col w-full">

  <!-- HEADER -->
  <header class="flex justify-end items-center px-6 py-4 bg-white border-b">
    <div class="flex items-center gap-5">
      <button class="relative p-2 rounded-full hover:bg-gray-100">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" class="w-6 h-6 text-gray-500">
          <path stroke-linecap="round" stroke-linejoin="round" d="M14.857 17.082a23.848 23.848 0 0 0 3.507-1.662A2.25 2.25 0 0 0 20.25 13.5v-2.036c0-2.577-1.456-4.954-3.708-6.016A6.375 6.375 0 0 0 6.75 6.75c-2.252 1.062-3.708 3.439-3.708 6.016V13.5c0 .795.423 1.537 1.136 1.92a23.848 23.848 0 0 0 3.507 1.662m7.172 0a11.548 11.548 0 0 1-7.172 0m7.172 0a3 3 0 1 1-7.172 0" />
        </svg>
      </button>
      <div id="staffAvatar" class="w-9 h-9 bg-emerald-600 rounded-full text-white flex items-center justify-center font-semibold">A</div>
      <div>
        <p id="staffName" class="font-medium">Staff Name</p>
        <p id="staffUsername" class="text-xs text-gray-500">username</p>
      </div>
    </div>
  </header>

  <!-- 🔥 DYNAMIC CONTENT -->
  <section
    id="mainContent"
    class="p-6 flex-1 overflow-y-auto">
    <!-- Dashboard / Billing content injected here -->
  </section>

</main>

<script type="module" src="../../JS/staff_dashboard/staff_dashboard.js"></script>
</body>
</html>
