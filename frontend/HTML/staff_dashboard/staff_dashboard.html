<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Staff Dashboard</title>
  <link rel="stylesheet" href="../../css/output.css" />
  <script src="../../JS/utils/authSession.js"></script>
  <script>
    window.IBMSAuth?.protectPage({ requiredRole: "staff" });
  </script>
</head>

<body class="flex min-h-screen bg-gray-50">

<!-- ===== SIDEBAR ===== -->
<aside class="w-64 bg-white border-r flex flex-col fixed h-screen">

  <!-- Logo -->
  <div class="h-16 px-4 flex items-center gap-2 border-b">
    <img src="../../assets/zealLogo.png" alt="ZCMMF Logo" class="h-9 w-9 object-contain rounded-md shrink-0">
    <div>
      <p class="text-base font-semibold text-gray-900 leading-tight">ZCMMF</p>
    </div>
  </div>

  <!-- NAV -->
  <nav class="flex-1 px-4 py-6 space-y-2">

    <!-- Dashboard -->
    <a href="#"
       id="navDashboard"
       class="nav-link flex items-center gap-3 px-4 py-2 rounded-lg bg-blue-600 text-white">
      <span>Dashboard</span>
    </a>

    <!-- Billing -->
     <a href="#"
       id="navBilling"
       class="nav-link flex items-center gap-3 px-4 py-2 rounded-lg text-gray-700 hover:bg-gray-100"
       style="display: none;">
      <span></span>
    </a>

    <!-- Inventory (placeholder) -->
    <a href="#"
   id="navInventory"
   class="nav-link flex items-center gap-3 px-4 py-2 rounded-lg text-gray-700 hover:bg-gray-100">
  <span>Inventory</span>
</a>

    <a href="#"
   id="navStockRequest"
   class="nav-link flex items-center gap-3 px-4 py-2 rounded-lg text-gray-700 hover:bg-gray-100">
  <span>Stock Request</span>
</a>

    <a href="#"
   id="navExpenses"
   class="nav-link flex items-center gap-3 px-4 py-2 rounded-lg text-gray-700 hover:bg-gray-100">
  <span>Expenses</span>
</a>

    <a href="#"
   id="navActivityLog"
   class="nav-link flex items-center gap-3 px-4 py-2 rounded-lg text-gray-700 hover:bg-gray-100">
  <span>Activity Log</span>
</a>

  </nav>

  <!-- LOGOUT -->
  <div class="border-t p-4 mt-auto">
    <button
      id="logoutBtn"
      type="button"
      class="w-full flex items-center gap-3 px-4 py-2 rounded-lg text-gray-700 hover:bg-red-50 hover:text-red-600 transition">
      Logout
     </button>
  </div>

</aside>

<!-- ===== MAIN ===== -->
<main class="ml-64 flex flex-col w-full">

  <!-- HEADER -->
  <header class="h-16 flex justify-end items-center px-4 bg-white border-b">
    <div class="flex items-center gap-3">
      <div id="notificationWidget" class="scale-90 origin-center"></div>
      <button id="profileBtn" class="flex items-center gap-3 hover:bg-gray-50 rounded-lg px-2 py-1 transition-colors cursor-pointer">
        <div id="staffAvatar" class="w-8 h-8 bg-blue-600 rounded-full text-white flex items-center justify-center font-semibold text-sm">A</div>
        <div>
          <p id="staffName" class="font-medium">Staff Name</p>
          <p id="staffUsername" class="text-xs text-left text-gray-500">Username</p>
        </div>
      </button>
      <button
        id="menuPosHeaderBtn"
        type="button"
        class="hidden p-1.5 rounded-lg hover:bg-gray-100 transition cursor-pointer"
        aria-label="Go to Billing"
        title="Go to Billing">
        <img src="../../assets/menuPOS.png" alt="MenuPOS" class="w-4 h-4 object-contain" />
      </button>
    </div>
  </header>

  <!-- 🔥 DYNAMIC CONTENT -->
  <section
    id="mainContent"
    class="p-6 flex-1 overflow-y-auto">
    <!-- Dashboard / Billing content injected here -->
  </section>

</main>

<script type="module" src="../../JS/staff_dashboard/staff_dashboard.js"></script>
</body>
</html>
