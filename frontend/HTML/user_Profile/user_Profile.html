<!-- USER PROFILE CONTENT ONLY - Clean Minimal Design -->
<div id="contentArea" class="p-4">
    <div class="w-full">
        <div class="bg-white rounded-lg shadow-sm border border-gray-200 p-4 pl-12 pr-32">
            <!-- Page Title -->
            <div class="mb-4">
                <h3 class="text-xl font-semibold text-gray-900 mb-2">Profile Information</h3>
                <p class="text-sm text-gray-500">Update your personal details</p>
            </div>

            <!-- Profile Header -->
            <div class="flex items-center gap-4 mb-3.5">
                <!-- Avatar - Now Clickable -->
                <div class="relative group">
                    <input type="file" id="avatar-upload" accept="image/*" class="hidden">
                    <div id="profile-avatar" 
                         class="w-20 h-20 rounded-full bg-blue-600 flex items-center justify-center text-white text-2xl font-semibold cursor-pointer hover:bg-blue-700 transition-colors relative overflow-hidden">
                        S
                    </div>
                    <!-- Hover Overlay -->
                    <div id="avatar-overlay" class="absolute inset-0 w-20 h-20 rounded-full bg-black bg-opacity-50 flex items-center justify-center text-white text-xs font-medium opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none cursor-pointer">
                        Change
                    </div>
                </div>
                
                <!-- Profile Info -->
                <div>
                    <h2 id="profile-fullname" class="text-2xl font-semibold text-gray-900 mb-1">Sample Admin</h2>
                    <p id="profile-role" class="text-gray-500">Admin</p>
                </div>
            </div>

            <!-- Form Fields in Single Column -->
            <div class="space-y-4">
                <!-- Full Name (Read-only) -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Full Name</label>
                    <input type="text" id="full-name" readonly 
                        class="w-full px-4 py-2 bg-gray-50 border border-gray-200 rounded-lg text-sm text-gray-600 cursor-not-allowed"
                    >
                </div>

                <!-- Employee ID (Read-only) -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Employee ID</label>
                    <input type="text" id="employee-id" readonly 
                        class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg text-sm text-gray-600 cursor-not-allowed">
                </div>

                <!-- Role -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Role</label>
                    <input type="text" id="role" readonly
                        class="w-full px-4 py-2.5 bg-gray-50 border border-gray-200 rounded-lg text-sm text-gray-600 cursor-not-allowed"
                    >
                </div>

                <!-- Contact Number (Editable) -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Contact Number</label>
                    <input type="tel" id="contact-number" 
                        class="w-full px-4 py-2.5 bg-white border border-gray-200 rounded-lg text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                    >
                </div>

                <!-- Email (Editable) -->
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                    <input type="email" id="email" 
                        class="w-full px-4 py-2.5 bg-white border border-gray-200 rounded-lg text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all"
                    >
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="flex gap-4 mt-6">
                <button id="saveProfileBtn"
                    class="px-6 py-2.5 bg-blue-600 text-white rounded-lg hover:bg-blue-700 transition-colors font-medium focus:outline-none focus:ring-2 focus:ring-blue-500 focus:ring-offset-2">
                    Save Changes
                </button>
            </div>
        </div>
    </div>
</div>

<script type="module" src="../../js/user_Profile/user_Profile.js"></script>
